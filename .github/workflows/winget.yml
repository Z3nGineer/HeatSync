name: 📦 Submit to winget

# Auto-submits a manifest update to microsoft/winget-pkgs when a new
# GitHub Release is published. Requires a WINGET_TOKEN repo secret —
# a GitHub PAT with `public_repo` scope (used to fork winget-pkgs and
# open the PR).
#
# FIRST RELEASE: winget-releaser updates an existing manifest, it does
# not create the initial one. Before this workflow can run, the initial
# Z3nGineer.HeatSync manifest must be submitted manually once via
# `wingetcreate new` — that's where the `Moniker: heatsync` field is set
# so users can run `winget install heatsync`. Subsequent releases are
# automatic.

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Z3nGineer.HeatSync
          installers-regex: '^HeatSync\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
