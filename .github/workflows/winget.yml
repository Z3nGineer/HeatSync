name: 📦 Submit to winget

# Auto-submits a manifest update to microsoft/winget-pkgs when a new
# GitHub Release is published. Requires a WINGET_TOKEN repo secret —
# a GitHub PAT with `public_repo` scope (used to fork winget-pkgs and
# open the PR).
#
# DISABLED until the Z3nGineer.HeatSync manifest is officially registered
# in microsoft/winget-pkgs. To enable: (1) submit the initial manifest
# manually via `wingetcreate new` with `Moniker: heatsync` set, (2) wait
# for Microsoft to merge it, (3) update `identifier:` below to
# Z3nGineer.HeatSync, (4) remove the `if: false` guard on the job.

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    if: false  # re-enable after Z3nGineer.HeatSync is registered in winget-pkgs
    runs-on: ubuntu-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: VibeSmiths.HeatSync
          installers-regex: '^HeatSync\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
