name: Build & Release HeatSync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies + PyInstaller
        run: |
          pip install pyqt6 psutil nvidia-ml-py pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name HeatSync HeatSync.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-Windows
          path: dist/HeatSync.exe

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: HeatSync-Windows
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "HeatSync v${{ github.run_number }}"
          body: |
            ## HeatSync — Real-time system monitor

            ### Downloads
            - **Windows**: Download `HeatSync.exe` below — no installation required
            - **Linux**: Clone the repo and run `bash install.sh`

            ### Changes
            See commit history for details.
          files: dist/HeatSync.exe
          generate_release_notes: false
