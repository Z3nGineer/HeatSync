name: 🐍 HeatSync Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3)"
        required: false
        type: string
  pull_request:

permissions:
  contents: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: "HeatSync"
  PACKAGE_FILENAME: "HeatSync"
  PYTHON_VERSION: "3.11"

# Versioning helper
jobs:
  versioner:
    name: 📋 Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v5.0.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .
          VALIDATE_PYTHON: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_BASH: true
          PYTHON_PYLINT_CONFIG_FILE: .pylintrc

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit and integration tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest
    needs: versioner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Inject version into source
        shell: bash
        run: |
          sed -i 's/return "v[^"]*"  # fallback — replaced by CI before build/return "v${{ needs.versioner.outputs.version }}"  # fallback — replaced by CI before build/' HeatSync.py

      - name: Build Windows EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name HeatSync `
            --icon=assets/icon.png `
            --add-data "assets:assets" `
            HeatSync.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-Windows-${{ needs.versioner.outputs.version }}
          path: dist/HeatSync.exe
          retention-days: 5

  build-linux:
    name: 🐧 Build Linux AppImage
    runs-on: ubuntu-latest
    needs: versioner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libharfbuzz0b \
            libfontconfig1 \
            xdotool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Inject version into source
        run: |
          sed -i 's/return "v[^"]*"  # fallback — replaced by CI before build/return "v${{ needs.versioner.outputs.version }}"  # fallback — replaced by CI before build/' HeatSync.py

      - name: Download AppImage tools
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --add-data "assets:assets" \
            HeatSync.py

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/HeatSync AppDir/usr/bin/
          
          # Create desktop file (Icon entry is required by linuxdeploy)
          cat > AppDir/usr/share/applications/heatsync.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=HeatSync
          Comment=Real-time system monitor
          Exec=HeatSync
          Icon=heatsync
          Categories=System;Monitor;
          Terminal=false
          EOF

          # Copy icon if available
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/heatsync.png
            echo "Icon found and copied"
          else
            echo "No icon.png found in assets/ - AppImage will build without icon"
          fi

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/HeatSync \
            --desktop-file AppDir/usr/share/applications/heatsync.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          mv HeatSync*.AppImage HeatSync.AppImage || true
          ls -lah HeatSync.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-Linux-${{ needs.versioner.outputs.version }}
          path: HeatSync.AppImage
          retention-days: 5

  release:
    name: 🚀 Create GitHub Release
    needs: [build-windows, build-linux, versioner]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Organize release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "HeatSync.exe" -o -name "HeatSync.AppImage" \) -exec cp {} release-files/ \;
          ls -lah release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.versioner.outputs.version }}"
          name: "HeatSync v${{ needs.versioner.outputs.version }}"
          body: |
            ## HeatSync — Real-time system monitor for Linux & Windows

            ### 📥 Downloads

            **Windows:**
            ```bash
            curl -L -o HeatSync.exe https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/HeatSync.exe
            .\HeatSync.exe
            ```

            **Linux:**
            ```bash
            curl -L -o HeatSync.AppImage https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/HeatSync.AppImage
            chmod +x HeatSync.AppImage
            ./HeatSync.AppImage
            ```

            Or clone and run:
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd HeatSync
            bash install.sh
            ```

            ### ℹ️ About This Release
            - **Windows**: Standalone EXE — no installation required, just run it
            - **Linux**: AppImage — works on most distributions (Ubuntu 18.04+, Fedora 32+, etc.)
            - **Version**: `${{ needs.versioner.outputs.version }}`
            - **Build**: #${{ github.run_number }}

            ### 📝 Changes
            See commit history for details.
          files: release-files/*
          generate_release_notes: false
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
