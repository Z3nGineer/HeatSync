name: 🐍 HeatSync Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3)"
        required: false
        type: string
  pull_request:

permissions:
  contents: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: "HeatSync"
  PACKAGE_FILENAME: "HeatSync"
  PYTHON_VERSION: "3.11"

# Versioning helper
jobs:
  versioner:
    name: 📋 Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(cat VERSION)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v5.0.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .
          VALIDATE_PYTHON: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_BASH: true
          PYTHON_PYLINT_CONFIG_FILE: .pylintrc

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-randr0 \
            libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit and integration tests
        run: |
          xvfb-run -a pytest tests/ -v --tb=short --cov=HeatSync --cov-report=xml --cov-report=term 2>&1 | tee /tmp/pytest-out.txt; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            FAILURES=$(grep -E "FAILED|AssertionError|Error" /tmp/pytest-out.txt | head -20 | tr '\n' '|')
            echo "::error::$FAILURES"
          fi
          exit $EXIT

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest
    needs: versioner
    env:
      SIGNPATH_AVAILABLE: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Inject version into source
        shell: bash
        run: |
          sed -i 's/return "v[^"]*"  # fallback — replaced by CI before build/return "v${{ needs.versioner.outputs.version }}"  # fallback — replaced by CI before build/' HeatSync.py

      - name: Build Windows EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name HeatSync `
            --icon=assets/icon.png `
            --add-data "assets:assets" `
            --add-data "VERSION:." `
            HeatSync.py

      - name: Sign EXE with Authenticode (SignPath.io)
        if: env.SIGNPATH_AVAILABLE == 'true'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: heatsync
          signing-policy-slug: release-signing
          artifact-configuration-slug: exe
          github-artifact-id: HeatSync-Windows-${{ needs.versioner.outputs.version }}
          wait-for-completion: true
          output-artifact-directory: dist/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-Windows-${{ needs.versioner.outputs.version }}
          path: dist/HeatSync.exe
          retention-days: 5

  build-linux:
    name: 🐧 Build Linux AppImage
    runs-on: ubuntu-latest
    needs: versioner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libharfbuzz0b \
            libfontconfig1 \
            xdotool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Inject version into source
        run: |
          sed -i 's/return "v[^"]*"  # fallback — replaced by CI before build/return "v${{ needs.versioner.outputs.version }}"  # fallback — replaced by CI before build/' HeatSync.py

      - name: Download AppImage tools
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --add-data "assets:assets" \
            --add-data "VERSION:." \
            HeatSync.py

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/HeatSync AppDir/usr/bin/
          
          # Create desktop file (Icon entry is required by linuxdeploy)
          cat > AppDir/usr/share/applications/heatsync.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=HeatSync
          Comment=Real-time system monitor
          Exec=HeatSync
          Icon=heatsync
          Categories=System;Monitor;
          Terminal=false
          EOF

          # Copy icon if available
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/heatsync.png
            echo "Icon found and copied"
          else
            echo "No icon.png found in assets/ - AppImage will build without icon"
          fi

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/HeatSync \
            --desktop-file AppDir/usr/share/applications/heatsync.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          mv HeatSync*.AppImage HeatSync.AppImage || true
          ls -lah HeatSync.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-Linux-${{ needs.versioner.outputs.version }}
          path: HeatSync.AppImage
          retention-days: 5

  build-macos:
    name: 🍎 Build macOS DMG
    runs-on: macos-latest
    needs: versioner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Inject version into source
        run: |
          sed -i '' 's/return "v[^"]*"  # fallback — replaced by CI before build/return "v${{ needs.versioner.outputs.version }}"  # fallback — replaced by CI before build/' HeatSync.py

      - name: Convert icon to icns
        run: |
          mkdir -p HeatSync.iconset
          sips -z 16  16  assets/icon.png --out HeatSync.iconset/icon_16x16.png
          sips -z 32  32  assets/icon.png --out HeatSync.iconset/icon_16x16@2x.png
          sips -z 32  32  assets/icon.png --out HeatSync.iconset/icon_32x32.png
          sips -z 64  64  assets/icon.png --out HeatSync.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out HeatSync.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_512x512.png
          iconutil -c icns HeatSync.iconset -o assets/icon.icns

      - name: Build macOS app bundle
        run: |
          pyinstaller \
            --windowed \
            --name HeatSync \
            --icon assets/icon.icns \
            --add-data "assets:assets" \
            --add-data "VERSION:." \
            HeatSync.py

      - name: Package as DMG
        run: |
          hdiutil create \
            -volname "HeatSync" \
            -srcfolder dist/HeatSync.app \
            -ov -format UDZO \
            HeatSync.dmg
          ls -lah HeatSync.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatSync-macOS-${{ needs.versioner.outputs.version }}
          path: HeatSync.dmg
          retention-days: 5

  release:
    name: 🚀 Create GitHub Release
    needs: [build-windows, build-linux, build-macos, versioner]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Organize release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "HeatSync.exe" -o -name "HeatSync.AppImage" -o -name "HeatSync.dmg" \) -exec cp {} release-files/ \;
          ls -lah release-files/

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback \
            --list-secret-keys

      - name: Sign release artifacts with GPG
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for f in release-files/HeatSync.exe release-files/HeatSync.AppImage release-files/HeatSync.dmg; do
            if [ -f "$f" ]; then
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
                --pinentry-mode loopback --detach-sign --armor "$f"
              echo "Signed: $f"
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          sha256sum $(ls) > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.versioner.outputs.version }}"
          name: "HeatSync v${{ needs.versioner.outputs.version }}"
          body: |
            ## HeatSync — Real-time system monitor for Linux, Windows & macOS

            ### 📥 Downloads

            **Windows:**
            ```bash
            curl -L -o HeatSync.exe https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/HeatSync.exe
            .\HeatSync.exe
            ```

            **Linux:**
            ```bash
            curl -L -o HeatSync.AppImage https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/HeatSync.AppImage
            chmod +x HeatSync.AppImage
            ./HeatSync.AppImage
            ```

            **macOS:**
            ```bash
            curl -L -o HeatSync.dmg https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/HeatSync.dmg
            open HeatSync.dmg
            ```

            Or clone and run:
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd HeatSync
            bash install.sh
            ```

            ### ℹ️ About This Release
            - **Windows**: Standalone EXE — no installation required, just run it
            - **Linux**: AppImage — works on most distributions (Ubuntu 18.04+, Fedora 32+, etc.)
            - **macOS**: DMG — drag HeatSync.app to Applications (Apple Silicon)
            - **Version**: `${{ needs.versioner.outputs.version }}`

            ### 📝 Changes
            See commit history for details.
          files: release-files/*
          generate_release_notes: false
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}

  update-aur:
    name: 📦 Update AUR Package
    needs: [release, versioner]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Get AppImage checksum from release
        id: meta
        run: |
          VERSION="${{ needs.versioner.outputs.version }}"
          SHA=$(curl -sL "https://github.com/crockednloaded/HeatSync/releases/download/v${VERSION}/SHA256SUMS" \
            | grep "HeatSync.AppImage$" | awk '{print $1}')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "AppImage SHA256: ${SHA}"

      - name: Update PKGBUILD and .SRCINFO
        run: |
          VERSION="${{ needs.versioner.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD
          sed -i "0,/[0-9a-f]\{64\}/s/[0-9a-f]\{64\}/${SHA}/" aur/PKGBUILD

          sed -i "s/\tpkgver = .*/\tpkgver = ${VERSION}/" aur/.SRCINFO
          sed -i "s/\tpkgrel = .*/\tpkgrel = 1/" aur/.SRCINFO
          sed -i "s/HeatSync-[0-9.]*\.AppImage/HeatSync-${VERSION}.AppImage/g" aur/.SRCINFO
          sed -i "0,/sha256sums = [0-9a-f]\{64\}/s/sha256sums = [0-9a-f]\{64\}/sha256sums = ${SHA}/" aur/.SRCINFO

      - name: Prepare AUR SSH key
        env:
          AUR_KEY_INPUT: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          echo "::notice::Secret length: ${#AUR_KEY_INPUT}"
          if [ -z "$AUR_KEY_INPUT" ]; then
            echo "::error::AUR_SSH_PRIVATE_KEY secret is empty or not set. Store the raw private key (cat ~/.ssh/id_ed25519) as the secret value."
            exit 1
          fi
          # Strip any CRLF line endings from the secret
          CLEAN_KEY=$(printf '%s' "$AUR_KEY_INPUT" | tr -d '\r')
          # Support both raw PEM and base64-encoded formats
          if printf '%s' "$CLEAN_KEY" | grep -q 'BEGIN'; then
            RAW_KEY="$CLEAN_KEY"
            echo "::notice::Key format: raw PEM (${#RAW_KEY} chars)"
          else
            echo "::notice::Attempting base64 decode (input: ${#CLEAN_KEY} chars)"
            if ! RAW_KEY=$(printf '%s' "$CLEAN_KEY" | base64 -d 2>/tmp/b64err); then
              echo "::error::base64 decode failed: $(cat /tmp/b64err)"
              exit 1
            fi
            echo "::notice::Key format: base64-decoded (${#RAW_KEY} chars)"
          fi
          FIRST_LINE=$(printf '%s' "$RAW_KEY" | head -1)
          echo "::notice::Key first line: ${FIRST_LINE}"
          # Write to GITHUB_ENV as multiline value
          printf 'AUR_RAW_KEY<<__KEYEOF__\n%s\n__KEYEOF__\n' "$RAW_KEY" >> "$GITHUB_ENV"

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: heatsync-bin
          pkgbuild: ./aur/PKGBUILD
          commit_username: stev3m
          commit_email: smackey2@gmail.com
          ssh_private_key: ${{ env.AUR_RAW_KEY }}
          commit_message: Update to v${{ needs.versioner.outputs.version }}
          force_push: 'true'
