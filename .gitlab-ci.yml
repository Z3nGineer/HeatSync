stages:
  - version
  - quality
  - build
  - release
  - aur

variables:
  PACKAGE_NAME: "HeatSync"
  PYTHON_VERSION: "3.11"

# ── Determine version ─────────────────────────────────────────────────────────
versioner:
  stage: version
  image: alpine:latest
  script:
    - |
      if [ -n "$VERSION_OVERRIDE" ]; then
        VERSION="$VERSION_OVERRIDE"
      else
        VERSION=$(cat VERSION)
      fi
      echo "VERSION=$VERSION" >> variables.env
      echo "Version: $VERSION"
  artifacts:
    reports:
      dotenv: variables.env

# ── Tests ─────────────────────────────────────────────────────────────────────
test:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - apt-get update && apt-get install -y
        xvfb libgl1 libegl1 libglib2.0-0 libdbus-1-3
        libfontconfig1 libfreetype6 libxkbcommon0 libxkbcommon-x11-0
        libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1
        libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-randr0
        libxcb-xinerama0
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-mock
  script:
    - xvfb-run -a pytest tests/ -v --tb=short --cov=heatsync --cov-report=term
  coverage: '/^TOTAL.*\s+(\d+%)$/'

# ── Lint ──────────────────────────────────────────────────────────────────────
lint:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install --upgrade pip
    - pip install pylint
    - pip install -r requirements.txt
  script:
    - pylint heatsync/ --exit-zero --output-format=text
  allow_failure: true

# ── Build Linux AppImage ──────────────────────────────────────────────────────
build-linux:
  stage: build
  image: python:${PYTHON_VERSION}
  needs:
    - job: versioner
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y
        libfuse2 libxkbcommon0 libxkbcommon-x11-0
        libdbus-1-3 libharfbuzz0b libfontconfig1
        xdotool file wget
    - pip install --upgrade pip
    - pip install -r requirements.txt pyinstaller
  script:
    - |
      sed -i "s/return \"v[^\"]*\"  # fallback/return \"v${VERSION}\"  # fallback/" heatsync/constants.py || true
    - pyinstaller --onefile --add-data "assets:assets" --add-data "VERSION:." HeatSync.py
    - |
      wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
      chmod +x linuxdeploy-x86_64.AppImage
    - |
      mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
      cp dist/HeatSync AppDir/usr/bin/
      cat > AppDir/usr/share/applications/heatsync.desktop << 'DESKTOP'
      [Desktop Entry]
      Type=Application
      Name=HeatSync
      Comment=Real-time system monitor
      Exec=HeatSync
      Icon=heatsync
      Categories=System;Monitor;
      Terminal=false
      DESKTOP
      cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/heatsync.png
    - ./linuxdeploy-x86_64.AppImage --appdir AppDir --executable AppDir/usr/bin/HeatSync --desktop-file AppDir/usr/share/applications/heatsync.desktop --output appimage
    - mv HeatSync*.AppImage HeatSync.AppImage
  artifacts:
    paths:
      - HeatSync.AppImage
    expire_in: 7 days

# ── Build Windows EXE ─────────────────────────────────────────────────────────
build-windows:
  stage: build
  tags:
    - windows
  needs:
    - job: versioner
      artifacts: true
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt pyinstaller
  script:
    - sed -i "s/return \"v[^\"]*\"  # fallback/return \"v${VERSION}\"  # fallback/" heatsync/constants.py || true
    - pyinstaller --onefile --windowed --name HeatSync --icon=assets/icon.png --add-data "assets;assets" --add-data "VERSION;." HeatSync.py
  artifacts:
    paths:
      - dist/HeatSync.exe
    expire_in: 7 days
  when: manual
  allow_failure: true

# ── Build macOS DMG ───────────────────────────────────────────────────────────
build-macos:
  stage: build
  tags:
    - macos
  needs:
    - job: versioner
      artifacts: true
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt pyinstaller
  script:
    - sed -i '' "s/return \"v[^\"]*\"  # fallback/return \"v${VERSION}\"  # fallback/" heatsync/constants.py || true
    - |
      mkdir -p HeatSync.iconset
      sips -z 16  16  assets/icon.png --out HeatSync.iconset/icon_16x16.png
      sips -z 32  32  assets/icon.png --out HeatSync.iconset/icon_16x16@2x.png
      sips -z 128 128 assets/icon.png --out HeatSync.iconset/icon_128x128.png
      sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_128x128@2x.png
      sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_256x256.png
      sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_256x256@2x.png
      sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_512x512.png
      iconutil -c icns HeatSync.iconset -o assets/icon.icns
    - pyinstaller --windowed --name HeatSync --icon assets/icon.icns --add-data "assets:assets" --add-data "VERSION:." HeatSync.py
    - hdiutil create -volname "HeatSync" -srcfolder dist/HeatSync.app -ov -format UDZO HeatSync.dmg
  artifacts:
    paths:
      - HeatSync.dmg
    expire_in: 7 days
  when: manual
  allow_failure: true

# ── Create GitLab Release ─────────────────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: versioner
      artifacts: true
    - job: build-linux
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache coreutils gnupg
  script:
    - |
      # GPG sign if key is available
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign --armor HeatSync.AppImage
      fi
    - sha256sum HeatSync.AppImage > SHA256SUMS
    - cat SHA256SUMS
  release:
    tag_name: "v${VERSION}"
    name: "HeatSync v${VERSION}"
    description: |
      ## HeatSync v${VERSION}

      Real-time system monitor for Linux, Windows, and macOS.

      ### Downloads

      **Linux (AppImage):**
      ```bash
      chmod +x HeatSync.AppImage
      ./HeatSync.AppImage
      ```

      **Arch Linux (AUR):**
      ```bash
      paru -S heatsync-bin
      ```

      **From source:**
      ```bash
      git clone https://gitlab.com/vibesmiths/HeatSync.git
      cd HeatSync && bash install.sh
      ```
    assets:
      links:
        - name: "HeatSync.AppImage"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/HeatSync.AppImage"
        - name: "SHA256SUMS"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/SHA256SUMS"
  artifacts:
    paths:
      - HeatSync.AppImage
      - HeatSync.AppImage.asc
      - SHA256SUMS
    expire_in: 30 days

# ── Update AUR package ────────────────────────────────────────────────────────
update-aur:
  stage: aur
  image: archlinux:latest
  needs:
    - job: versioner
      artifacts: true
    - job: release
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - pacman -Sy --noconfirm openssh git
    - |
      mkdir -p ~/.ssh
      echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
      chmod 600 ~/.ssh/aur
      echo "Host aur.archlinux.org" >> ~/.ssh/config
      echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
      echo "  User aur" >> ~/.ssh/config
      ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
      git config --global user.email "vibesmiths@users.noreply.gitlab.com"
      git config --global user.name "VibeSmiths"
  script:
    - |
      SHA=$(sha256sum HeatSync.AppImage | awk '{print $1}')
      echo "AppImage SHA256: $SHA"
    - |
      git clone ssh://aur@aur.archlinux.org/heatsync-bin.git /tmp/aur-pkg
      cd /tmp/aur-pkg
    - |
      sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
      sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
      sed -i "0,/[0-9a-f]\{64\}/s/[0-9a-f]\{64\}/${SHA}/" PKGBUILD
    - |
      sed -i "s/\tpkgver = .*/\tpkgver = ${VERSION}/" .SRCINFO
      sed -i "s/\tpkgrel = .*/\tpkgrel = 1/" .SRCINFO
      sed -i "s/HeatSync-[0-9.]*\.AppImage/HeatSync-${VERSION}.AppImage/g" .SRCINFO
      sed -i "0,/sha256sums = [0-9a-f]\{64\}/s/sha256sums = [0-9a-f]\{64\}/sha256sums = ${SHA}/" .SRCINFO
    - |
      git add PKGBUILD .SRCINFO
      git commit -m "Update to v${VERSION}" || echo "No changes to commit"
      git push
