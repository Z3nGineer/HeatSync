stages:
  - quality
  - build
  - release
  - aur

variables:
  PACKAGE_NAME: "HeatSync"
  PYTHON_VERSION: "3.11"

# ── Tests — runs on every push ───────────────────────────────────────────────
test:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - apt-get update && apt-get install -y
        xvfb libgl1 libegl1 libglib2.0-0 libdbus-1-3
        libfontconfig1 libfreetype6 libxkbcommon0 libxkbcommon-x11-0
        libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1
        libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-randr0
        libxcb-xinerama0
    - pip install --upgrade pip
    - pip install PyQt6 psutil nvidia-ml-py pytest pytest-cov pytest-mock Pillow
  script:
    - xvfb-run -a pytest tests/ -v --tb=short --cov=heatsync --cov-report=term
  coverage: '/^TOTAL.*\s+(\d+%)$/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ── Lint — runs on every push ────────────────────────────────────────────────
lint:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install --upgrade pip pylint PyQt6 psutil nvidia-ml-py
  script:
    - pylint heatsync/ --exit-zero --output-format=text
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ── Build Linux AppImage — runs on version tags ─────────────────────────────
build-linux:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - apt-get update && apt-get install -y
        libfuse2 libxkbcommon0 libxkbcommon-x11-0
        libdbus-1-3 libharfbuzz0b libfontconfig1
        libgl1 libegl1 libglib2.0-0
        file wget desktop-file-utils
    - pip install --upgrade pip
    - pip install PyQt6 psutil nvidia-ml-py pyinstaller
  script:
    # Build single-file executable
    - pyinstaller --onefile --name HeatSync
        --add-data "assets:assets"
        --add-data "VERSION:."
        --hidden-import heatsync
        --hidden-import heatsync.mainwindow
        --hidden-import heatsync.sensors
        --hidden-import heatsync.constants
        --hidden-import heatsync.lhm
        --hidden-import heatsync.widgets
        --hidden-import heatsync.settings
        --hidden-import heatsync.theme
        --hidden-import heatsync.titlebar
        --hidden-import heatsync.statusbar
        --hidden-import heatsync.compact
        --hidden-import heatsync.dialogs
        --hidden-import heatsync.autostart
        HeatSync.py
    # Create AppDir structure
    - |
      mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
      cp dist/HeatSync AppDir/usr/bin/
      cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/heatsync.png
      cp assets/icon.png AppDir/heatsync.png
    # Desktop entry (no leading whitespace)
    - |
      cat > AppDir/heatsync.desktop << 'EOF'
      [Desktop Entry]
      Type=Application
      Name=HeatSync
      Comment=Real-time system monitor
      Exec=HeatSync
      Icon=heatsync
      Categories=System;Monitor;
      Terminal=false
      EOF
      cp AppDir/heatsync.desktop AppDir/usr/share/applications/
    # AppRun launcher
    - |
      cat > AppDir/AppRun << 'APPRUN'
      #!/bin/bash
      SELF=$(readlink -f "$0")
      HERE=${SELF%/*}
      exec "${HERE}/usr/bin/HeatSync" "$@"
      APPRUN
      chmod +x AppDir/AppRun
    # Download appimagetool and build AppImage (extract mode for Docker — no FUSE)
    - wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
    - chmod +x appimagetool-x86_64.AppImage
    - ./appimagetool-x86_64.AppImage --appimage-extract
    - ARCH=x86_64 ./squashfs-root/AppRun AppDir HeatSync.AppImage
  artifacts:
    paths:
      - HeatSync.AppImage
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/

# ── Build Windows EXE — requires self-hosted Windows runner ─────────────────
# To enable: set up a Windows runner with tag "windows" in your GitLab project.
# See: https://docs.gitlab.com/runner/install/windows.html
build-windows:
  stage: build
  tags:
    - windows
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt pyinstaller
  script:
    - pyinstaller --onefile --windowed --name HeatSync
        --icon=assets/icon.png
        --add-data "assets;assets"
        --add-data "VERSION;."
        HeatSync.py
  artifacts:
    paths:
      - dist/HeatSync.exe
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
      when: manual
  allow_failure: true

# ── Build macOS DMG — requires self-hosted macOS runner ─────────────────────
# To enable: set up a macOS runner with tag "macos" in your GitLab project.
# See: https://docs.gitlab.com/runner/install/osx.html
build-macos:
  stage: build
  tags:
    - macos
  before_script:
    - pip install --upgrade pip
    - pip install PyQt6 psutil nvidia-ml-py pyinstaller
  script:
    # Create icns icon from png
    - |
      mkdir -p HeatSync.iconset
      sips -z 16  16  assets/icon.png --out HeatSync.iconset/icon_16x16.png
      sips -z 32  32  assets/icon.png --out HeatSync.iconset/icon_16x16@2x.png
      sips -z 128 128 assets/icon.png --out HeatSync.iconset/icon_128x128.png
      sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_128x128@2x.png
      sips -z 256 256 assets/icon.png --out HeatSync.iconset/icon_256x256.png
      sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_256x256@2x.png
      sips -z 512 512 assets/icon.png --out HeatSync.iconset/icon_512x512.png
      iconutil -c icns HeatSync.iconset -o assets/icon.icns
    - pyinstaller --windowed --name HeatSync
        --icon assets/icon.icns
        --add-data "assets:assets"
        --add-data "VERSION:."
        HeatSync.py
    - hdiutil create -volname "HeatSync" -srcfolder dist/HeatSync.app -ov -format UDZO HeatSync.dmg
  artifacts:
    paths:
      - HeatSync.dmg
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
      when: manual
  allow_failure: true

# ── Create GitLab Release ───────────────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-linux
      artifacts: true
  before_script:
    - apk add --no-cache coreutils gnupg
  script:
    - VERSION=$(cat VERSION)
    - echo "Creating release v${VERSION}"
    # GPG sign if key is available
    - |
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign --armor HeatSync.AppImage
      fi
    - sha256sum HeatSync.AppImage > SHA256SUMS
    - cat SHA256SUMS
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "HeatSync $CI_COMMIT_TAG"
    description: |
      ## HeatSync $CI_COMMIT_TAG

      Real-time system monitor for Linux, Windows, and macOS.

      ### Downloads

      **Linux (AppImage):**
      ```bash
      chmod +x HeatSync.AppImage
      ./HeatSync.AppImage
      ```

      **Arch Linux (AUR):**
      ```bash
      paru -S heatsync-bin
      ```

      **From source:**
      ```bash
      git clone https://gitlab.com/vibesmiths/HeatSync.git
      cd HeatSync && bash install.sh
      ```
    assets:
      links:
        - name: "HeatSync.AppImage"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/HeatSync.AppImage"
        - name: "SHA256SUMS"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/SHA256SUMS"
  artifacts:
    paths:
      - HeatSync.AppImage
      - HeatSync.AppImage.asc
      - SHA256SUMS
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/

# ── Update AUR package ─────────────────────────────────────────────────────
# Requires CI variable: AUR_SSH_PRIVATE_KEY (SSH key registered on AUR)
update-aur:
  stage: aur
  image: archlinux:latest
  needs:
    - job: release
      artifacts: true
  before_script:
    - pacman -Sy --noconfirm openssh git
    - |
      mkdir -p ~/.ssh
      echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
      chmod 600 ~/.ssh/aur
      echo "Host aur.archlinux.org" >> ~/.ssh/config
      echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
      echo "  User aur" >> ~/.ssh/config
      ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
      git config --global user.email "vibesmiths@users.noreply.gitlab.com"
      git config --global user.name "VibeSmiths"
  script:
    - VERSION=$(cat VERSION)
    - |
      SHA=$(sha256sum HeatSync.AppImage | awk '{print $1}')
      echo "AppImage SHA256: $SHA"
    - |
      git clone ssh://aur@aur.archlinux.org/heatsync-bin.git /tmp/aur-pkg
      cd /tmp/aur-pkg
    - |
      sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
      sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
      sed -i "0,/[0-9a-f]\{64\}/s/[0-9a-f]\{64\}/${SHA}/" PKGBUILD
    - |
      sed -i "s/\tpkgver = .*/\tpkgver = ${VERSION}/" .SRCINFO
      sed -i "s/\tpkgrel = .*/\tpkgrel = 1/" .SRCINFO
      sed -i "s/HeatSync-[0-9.]*\.AppImage/HeatSync-${VERSION}.AppImage/g" .SRCINFO
      sed -i "0,/sha256sums = [0-9a-f]\{64\}/s/sha256sums = [0-9a-f]\{64\}/sha256sums = ${SHA}/" .SRCINFO
    - |
      git add PKGBUILD .SRCINFO
      git commit -m "Update to v${VERSION}" || echo "No changes to commit"
      git push
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
